  { id: "jerusalem",    label: "ירושלים",     cities: ["ירושלים","בית שמש","מעלה אדומים"] },
  { id: "shfela",       label: "שפלה",        cities: ["אשקלון","קריית גת","שדרות","נתיבות","קריית מלאכי","אופקים"] },
  { id: "negev_north",  label: "נגב צפוני",   cities: ["באר שבע","דימונה","ערד","רהט","ירוחם","תל שבע"] },
  { id: "negev_south",  label: "נגב דרומי",   cities: ["מצפה רמון","אילת","יוטבתה","עין יהב"] },
  { id: "jordan_valley",label: "בקעה",        cities: ["בית שאן","טבריה","יריחו","בקעת הירדן"] },
  { id: "west_bank_north",label: "שומרון",    cities: ["שכם","טול כרם","קלקיליה","אריאל","כדומים"] },
];
const DEMO_SCENARIOS = [
  ["תל אביב","רמת גן","גבעתיים","בני ברק"],
  ["חיפה","קריית ביאליק","קריית אתא"],
  ["אשקלון","שדרות","נתיבות","אופקים"],
  ["באר שבע","ירוחם","דימונה"],
  [],
];
let alertCities=[], alertHistory=[], wakeLockObj=null, wakeLockActive=false;
let demoMode=false, demoIndex=0, flashOn=true, fetchInterval=null;
setInterval(()=>{ flashOn=!flashOn; updateMapColors(); },600);
function buildRegionTags(){
  const wrap=document.getElementById("region-tags"); wrap.innerHTML="";
  REGIONS.forEach(r=>{
    const tag=document.createElement("span");
    tag.className="region-tag"; tag.id="tag-"+r.id;
    tag.innerHTML=`<span class="region-dot" id="dot-${r.id}"></span>${r.label}`;
    wrap.appendChild(tag);
  });
}
function getAlertedRegionIds(cities){
  if(!cities||cities.length===0) return new Set();
  const alerted=new Set();
  REGIONS.forEach(r=>{ cities.forEach(city=>{ if(r.cities.some(c=>city.includes(c)||c.includes(city))) alerted.add(r.id); }); });
  return alerted;
}
function updateUI(cities){
  const alerted=getAlertedRegionIds(cities), hasAlert=cities.length>0;
  document.body.classList.toggle("alert-active",hasAlert);
  document.getElementById("topbar").classList.toggle("alert-active",hasAlert);
  const banner=document.getElementById("alert-banner");
  if(hasAlert){ banner.classList.add("show"); document.getElementById("alert-cities").innerHTML=cities.map(c=>`<span class="alert-city">${c}</span>`).join(""); }
  else banner.classList.remove("show");
  document.getElementById("status-dot").className=hasAlert?"alert":"";
  document.getElementById("status-text").textContent=hasAlert?`התראה פעילה — ${cities.length} אזורים`:"אין התראות פעילות";
  const sc=document.getElementById("status-circle"), st=document.getElementById("status-map-text");
  sc.setAttribute("fill",hasAlert?"#ef4444":"#10b981");
  st.setAttribute("fill",hasAlert?"#ef4444":"#10b981");
  st.textContent=hasAlert?"⚠ התראה":"✓ שקט";
  REGIONS.forEach(r=>{
    const tag=document.getElementById("tag-"+r.id), dot=document.getElementById("dot-"+r.id);
    if(alerted.has(r.id)){ tag.classList.add("alerted"); dot.classList.add("alerted"); }
    else{ tag.classList.remove("alerted"); dot.classList.remove("alerted"); }
  });
  updateMapColors(alerted);
}
function updateMapColors(alerted){
  if(!alerted) alerted=getAlertedRegionIds(alertCities);
  REGIONS.forEach(r=>{
    const g=document.getElementById("region-"+r.id); if(!g) return;
    const path=g.querySelector("path"), label=g.querySelector("text");
    const isAlerted=alerted.has(r.id);
    const old=g.querySelector(".ripple-path"); if(old) old.remove();
    if(isAlerted){
      path.setAttribute("fill",flashOn?"#ef4444":"#991b1b");
      path.setAttribute("stroke","#ff6666"); path.setAttribute("stroke-width","1.5");
      path.setAttribute("filter","url(#alertGlow)");
      if(label) label.setAttribute("fill","#ffcccc");
      if(flashOn){
        const ripple=document.createElementNS("http://www.w3.org/2000/svg","path");
        ripple.setAttribute("d",path.getAttribute("d")); ripple.setAttribute("fill","none");
        ripple.setAttribute("stroke","#ff4444"); ripple.setAttribute("stroke-width","3");
        ripple.setAttribute("stroke-opacity","0.6"); ripple.classList.add("ripple-path");
        g.appendChild(ripple);
      }
    } else {
      path.setAttribute("fill","#0f1f3d"); path.setAttribute("stroke","#2563eb");
      path.setAttribute("stroke-width","0.8"); path.removeAttribute("filter");
      if(label) label.setAttribute("fill","#4a7cbf");
    }
  });
}
function addHistory(cities){
  if(cities.length===0) return;
  alertHistory.unshift({cities:[...cities],time:new Date().toLocaleTimeString("he-IL")});
  if(alertHistory.length>10) alertHistory.pop();
  renderHistory();
}
function renderHistory(){
  const list=document.getElementById("history-list");
  if(alertHistory.length===0){ list.innerHTML='<div style="color:#333;font-size:12px;text-align:center;padding:10px">אין היסטוריה עדיין</div>'; return; }
  list.innerHTML=alertHistory.map((h,i)=>`<div class="hist-item" style="opacity:${1-i*0.08}"><div class="hist-time">🕐 ${h.time}</div><div>${h.cities.map(c=>`<span class="hist-city">${c}</span>`).join("")}</div></div>`).join("");
}
async function fetchOref(){
  try{
    const res=await fetch("https://www.oref.org.il/WarningMessages/alert/alerts.json",{headers:{"X-Requested-With":"XMLHttpRequest","Referer":"https://www.oref.org.il/"},cache:"no-store"});
    const text=(await res.text()).replace(/^\uFEFF/,"").trim();
    const cities=text?(JSON.parse(text).data||[]):[];
    if(cities.length>alertCities.length&&cities.length>0){ playBeep(); addHistory(cities); }
    alertCities=cities; updateUI(cities);
  }catch(e){}
  document.getElementById("lastupdate").textContent="עודכן: "+new Date().toLocaleTimeString("he-IL");
}
function playBeep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.35,0.7].forEach(delay=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=delay===0.35?660:880;
      g.gain.setValueAtTime(0.25,ctx.currentTime+delay);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.3);
      o.start(ctx.currentTime+delay); o.stop(ctx.currentTime+delay+0.35);
    });
  }catch(e){}
}
function toggleDemo(){
  demoMode=!demoMode;
  const btn=document.getElementById("btn-demo");
  btn.textContent=demoMode?"■ עצור דמו":"▶ דמו";
  btn.classList.toggle("active",demoMode);
  if(!demoMode){ alertCities=[]; updateUI([]); } else runDemo();
}
function runDemo(){
  if(!demoMode) return;
  const cities=DEMO_SCENARIOS[demoIndex%DEMO_SCENARIOS.length]; demoIndex++;
  if(cities.length>0){ playBeep(); addHistory(cities); }
  alertCities=cities; updateUI(cities);
  document.getElementById("lastupdate").textContent="דמו — "+new Date().toLocaleTimeString("he-IL");
  setTimeout(runDemo,3000);
}
async function toggleWakeLock(){
  const btn=document.getElementById("btn-wakelock"), footer=document.getElementById("footer-wakelock");
  if(!("wakeLock" in navigator)){ alert("הדפדפן שלך לא תומך ב-Wake Lock.\nנסה כרום עדכני."); return; }
  if(!wakeLockActive){
    try{
