<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#050810">
<title>🛡️ פיקוד העורף</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #050810; color: #ddd;
  font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
  direction: rtl; height: 100vh; overflow: hidden; display: flex; flex-direction: column;
}
body.alert-active { background: #0d0000; }

#topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; background: rgba(255,255,255,0.03);
  border-bottom: 1px solid #1a1f2e; flex-shrink: 0; z-index: 100;
}
#topbar.alert-active { border-bottom-color: #ff3333; }
#title { font-size: 15px; font-weight: 700; }
#lastupdate { font-size: 10px; color: #555; margin-top: 1px; }

#btn-wakelock {
  background: #1e2235; border: 1px solid #333; border-radius: 8px;
  padding: 7px 11px; color: #aaa; font-size: 11px; font-weight: 700; cursor: pointer; margin-right: 6px;
}
#btn-wakelock.active { background: #065f46; border-color: #10b981; color: #10b981; }
#btn-demo {
  background: #1e2235; border: 1px solid #333; border-radius: 8px;
  padding: 7px 9px; color: #aaa; font-size: 11px; cursor: pointer;
}
#btn-demo.active { background: #4c1d95; border-color: #7c3aed; color: #c4b5fd; }

#alert-banner {
  display: none; background: linear-gradient(135deg, #7f0000, #cc0000);
  padding: 10px 16px; text-align: center; flex-shrink: 0;
}
#alert-banner.show { display: block; }
#alert-title { font-size: 18px; font-weight: 900; margin-bottom: 4px; }
#alert-timer { font-size: 11px; color: rgba(255,255,255,0.7); margin-bottom: 6px; }
#alert-cities { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
.alert-city { background: rgba(0,0,0,0.4); border-radius: 5px; padding: 2px 9px; font-size: 12px; font-weight: 600; }
.alert-city.my-area { background: rgba(255,220,0,0.25); border: 1px solid rgba(255,220,0,0.6); }

#status-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px; font-size: 12px; flex-shrink: 0;
  border-bottom: 1px solid #111;
}
#status-dot { width: 7px; height: 7px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; flex-shrink: 0; }
#status-dot.alert { background: #ef4444; animation: pulse 0.7s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(1.5);} }

#main { display: flex; flex: 1; overflow: hidden; }

#map-wrap {
  flex: 0 0 58%; position: relative; overflow: hidden;
  background: radial-gradient(ellipse at 40% 40%, #0a1628 0%, #050810 100%);
  border-left: 1px solid #1a1f2e;
}
#map-svg {
  width: 100%; height: 100%;
  transition: none;
}
/* viewBox transition via JS */

.region-path {
  transition: fill 0.4s, stroke 0.3s;
}

#zoom-label {
  position: absolute; top: 8px; right: 8px;
  background: rgba(0,0,0,0.6); border: 1px solid #333;
  border-radius: 6px; padding: 4px 8px; font-size: 10px; color: #666;
  transition: opacity 0.5s;
}

#panel {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
}
.panel-section { padding: 8px 12px; border-bottom: 1px solid #1a1f2e; flex-shrink: 0; }
.section-label { font-size: 9px; color: #555; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.region-tag {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 6px; border-radius: 4px; font-size: 10px;
  color: #6b8cc7; border: 1px solid transparent; margin: 1px;
}
.region-tag.alerted { color: #fca5a5; background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); }
.region-tag.my-area-tag { color: #fde68a; font-weight: 700; }
.region-tag.my-area-tag.alerted { color: #fef08a; background: rgba(234,179,8,0.2); border-color: rgba(234,179,8,0.5); }
.rtag-dot { width: 5px; height: 5px; border-radius: 50%; background: #1e3a5f; border: 1px solid #2563eb; flex-shrink: 0; }
.rtag-dot.alerted { background: #ef4444; border-color: #ef4444; }
.sub-label { font-size: 9px; color: #445; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin: 5px 2px 3px; display: block; }

#history-wrap { flex: 1; overflow-y: auto; padding: 8px 12px; }
.hist-item { background: rgba(255,255,255,0.03); border: 1px solid #1a1f2e; border-radius: 6px; padding: 6px 8px; margin-bottom: 5px; }
.hist-time { font-size: 9px; color: #555; margin-bottom: 3px; }
.hist-city { display: inline-block; background: rgba(239,68,68,0.1); color: #fca5a5; border-radius: 3px; padding: 1px 5px; font-size: 9px; margin: 1px; }

#footer { display: flex; justify-content: space-between; padding: 6px 12px; border-top: 1px solid #1a1f2e; font-size: 9px; color: #444; flex-shrink: 0; }
</style>
</head>
<body>

<div id="topbar">
  <div>
    <div id="title">🛡️ פיקוד העורף — מעקב חי</div>
    <div id="lastupdate">מתחבר...</div>
  </div>
  <div style="display:flex;gap:5px;align-items:center">
    <button id="btn-demo" onclick="toggleDemo()">▶ דמו</button>
    <button id="btn-wakelock" onclick="toggleWakeLock()">💤 נעל מסך</button>

<div id="alert-banner">

<script>
// ─── DATA ───────────────────────────────────────────────
const REGIONS = [

  {id:"negev_north",  label:"נגב צפוני",  cities:["באר שבע","דימונה","ערד","רהט","ירוחם","תל שבע"]},
  {id:"negev_south",  label:"נגב דרומי",  cities:["מצפה רמון","אילת","יוטבתה"]},

  {id:"west_bank",    label:"שומרון",     cities:["שכם","טול כרם","קלקיליה","אריאל"]},
];

const CITIES = [
  {id:"tiberias",    label:"טבריה",      names:["טבריה"],               isMyArea:true},
  {id:"tzamach",     label:"צמח",        names:["צמח"]},
  {id:"kinneret",    label:"כינרת",      names:["כינרת","כנרת"]},
  {id:"beit_yerach", label:"בית ירח",    names:["בית ירח"]},
  {id:"migdal",      label:"מגדל",       names:["מגדל"]},
  {id:"ginosar",     label:"גינוסר",     names:["גינוסר","גנוסר"]},
  {id:"arbel",       label:"ארבל",       names:["ארבל"]},
  {id:"kafr_hitim",  label:"כפר חיטים",  names:["כפר חיטים","חיטין"]},
  {id:"kafr_zeitim", label:"כפר זיתים",  names:["כפר זיתים"]},
  {id:"givat_avni",  label:"גבעת אבני",  names:["גבעת אבני"]},
  {id:"lavie",       label:"לביא",       names:["לביא"]},
  {id:"kafr_kana",   label:"כפר כנא",    names:["כפר כנא","כפר קנא"]},
  {id:"golani",      label:"צומת גולני", names:["גולני","צומת גולני","אילניה"]},
];

// ישובי טבריה גם שייכים ל"שאר הצפון" לצורך סינון
const TIBERIAS_AREA_ALL_NAMES = CITIES.flatMap(c=>c.names);

const DEMO_SCENARIOS = [
  ["טבריה","צמח","כינרת"],
  ["ארבל","כפר חיטים","לביא"],
  ["טבריה"],
  ["חיפה","קריית ביאליק"],
  ["אשקלון","שדרות"],
  [],
];

// viewBox: full Israel vs zoomed to Tiberias area
const VB_FULL   = "90 10 190 310";
const VB_NORTH  = "195 42 80 60"; // ממוקד על אזור טבריה

// ─── STATE ──────────────────────────────────────────────
let alertCities=[], alertHistory=[];
let wakeLockObj=null, wakeLockActive=false;
let demoMode=false, demoIndex=0;
let alertClearTimeout=null, alertEndTime=null, timerInterval=null;
let isZoomed=false;

// ─── HELPERS ────────────────────────────────────────────
function cityMatch(names, a){ return names.some(n=>a.includes(n)||n.includes(a)); }

function getAlerted(cities){
  const r=new Set(), c=new Set();
  if(!cities||!cities.length) return {r,c};
  REGIONS.forEach(reg=>{
    if(cities.some(a=>reg.cities.some(n=>a.includes(n)||n.includes(a)))) r.add(reg.id);
    // ישובי טבריה → שאר הצפון
    if(reg.id==="north_rest" && cities.some(a=>TIBERIAS_AREA_ALL_NAMES.some(n=>a.includes(n)||n.includes(a)))) r.add("north_rest");
  });
  CITIES.forEach(ct=>{ if(cities.some(a=>cityMatch(ct.names,a))) c.add(ct.id); });
  return {r,c};
}

function isNorthAlert(cities){
  return cities.some(a=>TIBERIAS_AREA_ALL_NAMES.some(n=>a.includes(n)||n.includes(a)));
}

// ─── ZOOM ────────────────────────────────────────────────
function animateViewBox(fromVB, toVB, duration, cb){
  const svg = document.getElementById("map-svg");
  const [fx,fy,fw,fh] = fromVB.split(" ").map(Number);
  const [tx,ty,tw,th] = toVB.split(" ").map(Number);
  const start = performance.now();
  function step(now){
    const t = Math.min((now-start)/duration, 1);
    const ease = t<0.5 ? 2*t*t : -1+(4-2*t)*t;
    const x = fx+(tx-fx)*ease, y = fy+(ty-fy)*ease;
    const w = fw+(tw-fw)*ease, h = fh+(th-fh)*ease;
    svg.setAttribute("viewBox", `${x} ${y} ${w} ${h}`);
    if(t<1) requestAnimationFrame(step);
    else { svg.setAttribute("viewBox", toVB); if(cb) cb(); }
  }
  requestAnimationFrame(step);
}

function zoomToNorth(){
  if(isZoomed) return;
  isZoomed=true;
  document.getElementById("zoom-label").textContent="אזור טבריה";
  // הראה את שכבת הזום
  document.getElementById("zoom-layer").setAttribute("opacity","1");
  animateViewBox(VB_FULL, VB_NORTH, 800);
}

function zoomOut(){
  if(!isZoomed) return;
  isZoomed=false;
  document.getElementById("zoom-label").textContent="כל הארץ";
  animateViewBox(VB_NORTH, VB_FULL, 700, ()=>{
    document.getElementById("zoom-layer").setAttribute("opacity","0");
  });
}

// ─── UI UPDATE ───────────────────────────────────────────
function updateTimer(){
  if(!alertEndTime) return;
  const rem=Math.max(0,Math.round((alertEndTime-Date.now())/1000));
  const m=Math.floor(rem/60), s=rem%60;
  const el=document.getElementById("alert-timer");
  if(el) el.textContent=`ההתראה תפוג בעוד ${m}:${String(s).padStart(2,"0")}`;
  if(rem===0) clearAlert();
}
function clearAlert(){
  clearInterval(timerInterval); clearTimeout(alertClearTimeout);
  alertCities=[]; alertEndTime=null;
  updateUI([]);
  zoomOut();
}
function scheduleAlertClear(){
  clearTimeout(alertClearTimeout); clearInterval(timerInterval);
  alertEndTime=Date.now()+10*60*1000;
  alertClearTimeout=setTimeout(clearAlert, 10*60*1000);
  timerInterval=setInterval(updateTimer, 1000);
}

function updateUI(cities){
  const {r:alertedR, c:alertedC} = getAlerted(cities);
  const hasAlert = cities.length>0;
  const hasNorth = isNorthAlert(cities);

  document.body.classList.toggle("alert-active", hasAlert);
  document.getElementById("topbar").classList.toggle("alert-active", hasAlert);

  // Banner
  const banner=document.getElementById("alert-banner");
  if(hasAlert){
    banner.classList.add("show");
    document.getElementById("alert-cities").innerHTML=cities.map(c=>{
      const isMine=CITIES.some(x=>x.isMyArea&&cityMatch(x.names,c));
      return `<span class="alert-city${isMine?" my-area":""}">${c}</span>`;
    }).join("");
  } else {
    banner.classList.remove("show");
    const t=document.getElementById("alert-timer"); if(t) t.textContent="";
  }

  // Status bar
  document.getElementById("status-dot").className=hasAlert?"alert":"";
  document.getElementById("status-text").textContent=hasAlert
    ? `🚨 התראה פעילה — ${cities.length} ישובים`
    : "✅ אין התראות פעילות";

  // Map status dot
  const sc=document.getElementById("status-circle"), st=document.getElementById("status-map-text");
  sc.setAttribute("fill", hasAlert?"#ef4444":"#10b981");
  st.setAttribute("fill", hasAlert?"#ef4444":"#10b981");
  st.textContent=hasAlert?"⚠ התראה":"✓ שקט";

  // Zoom
  if(hasNorth && hasAlert) zoomToNorth();
  else if(!hasNorth && isZoomed) zoomOut();

  // Color country regions
  REGIONS.forEach(reg=>{
    const tag=document.getElementById("tag-"+reg.id), dot=document.getElementById("rdot-"+reg.id);
    const isA=alertedR.has(reg.id);
    if(tag) tag.classList.toggle("alerted",isA);
    if(dot) dot.classList.toggle("alerted",isA);
    const g=document.getElementById("region-"+reg.id); if(!g) return;
    const path=g.querySelector("path"), lbl=g.querySelector("text");
    if(isA){
      path.setAttribute("fill","#7f1d1d"); path.setAttribute("stroke","#ef4444");
      path.setAttribute("stroke-width","1.2"); path.setAttribute("filter","url(#alertGlow)");
      if(lbl) lbl.setAttribute("fill","#fca5a5");
    } else {
      path.setAttribute("fill","#0f1f3d"); path.setAttribute("stroke","#2563eb");
      path.setAttribute("stroke-width","0.8"); path.removeAttribute("filter");
      if(lbl) lbl.setAttribute("fill","#4a7cbf");
    }
  });

  // Color city sub-regions
  CITIES.forEach(ct=>{
    const tag=document.getElementById("tag-"+ct.id), dot=document.getElementById("cdot-tag-"+ct.id);
    const isA=alertedC.has(ct.id);
    if(tag) tag.classList.toggle("alerted",isA);
    if(dot) dot.classList.toggle("alerted",isA);
    const g=document.getElementById("city-"+ct.id); if(!g) return;
    const path=g.querySelector("path"), lbl=g.querySelector("text");
    if(isA){
      path.setAttribute("fill", ct.isMyArea?"#78350f":"#7f1d1d");
      path.setAttribute("stroke", ct.isMyArea?"#fde047":"#ef4444");
      path.setAttribute("stroke-width","1"); path.setAttribute("filter","url(#alertGlow)");
      if(lbl) lbl.setAttribute("fill", ct.isMyArea?"#fef08a":"#fca5a5");
    } else {
      path.setAttribute("fill","#0f1f3d"); path.setAttribute("stroke","#2563eb");
      path.setAttribute("stroke-width","0.6"); path.removeAttribute("filter");
      if(lbl) lbl.setAttribute("fill", ct.isMyArea?"#93c5fd":"#4a7cbf");
    }
  });
}

// ─── TAGS ────────────────────────────────────────────────
function buildTags(){
  const wrap=document.getElementById("region-tags"); wrap.innerHTML="";
  REGIONS.forEach(reg=>{
    const t=document.createElement("span");
    t.className="region-tag"; t.id="tag-"+reg.id;
    t.innerHTML=`<span class="rtag-dot" id="rdot-${reg.id}"></span>${reg.label}`;
    wrap.appendChild(t);
  });
  const sep=document.createElement("span"); sep.className="sub-label"; sep.textContent="אזור טבריה";
  wrap.appendChild(sep);
  CITIES.forEach(ct=>{
    const t=document.createElement("span");
    t.className="region-tag"+(ct.isMyArea?" my-area-tag":""); t.id="tag-"+ct.id;
    t.innerHTML=`<span class="rtag-dot" id="cdot-tag-${ct.id}"></span>${ct.label}`;
    wrap.appendChild(t);
  });
}

// ─── HISTORY ─────────────────────────────────────────────
function addHistory(cities){
  if(!cities.length) return;
  alertHistory.unshift({cities:[...cities], time:new Date().toLocaleTimeString("he-IL")});
  if(alertHistory.length>15) alertHistory.pop();
  renderHistory();
}
function renderHistory(){
  const list=document.getElementById("history-list");
  if(!alertHistory.length){ list.innerHTML='<div style="color:#333;font-size:11px;text-align:center;padding:8px">אין היסטוריה עדיין</div>'; return; }
  list.innerHTML=alertHistory.map((h,i)=>`<div class="hist-item" style="opacity:${Math.max(0.3,1-i*0.06)}"><div class="hist-time">🕐 ${h.time}</div><div>${h.cities.map(c=>`<span class="hist-city">${c}</span>`).join("")}</div></div>`).join("");
}

// ─── FETCH ───────────────────────────────────────────────
async function fetch(){
  try{
    const res=await fetch("https://oref-deploy.oriyaziv.workers.dev/alerts",{
      headers:{"X-Requested-With":"XMLHttpRequest","Referer":"https://www.oref.org.il/"},cache:"no-store"});
    const text=(await res.text()).replace(/^\uFEFF/,"").trim();
    if(!text){ document.getElementById("lastupdate").textContent="עודכן: "+new Date().toLocaleTimeString("he-IL"); return; }
    const data=JSON.parse(text);
    const cat=parseInt(data.cat||data.category||"1");
    // סינון — רק כניסה למרחב מוגן (cat=1) או כל אם 0
    if(cat!==0&&cat!==1){ document.getElementById("lastupdate").textContent="עודכן: "+new Date().toLocaleTimeString("he-IL"); return; }
    const cities=data.data||[];
    if(cities.length>0){
      const isNew=cities.some(c=>!alertCities.includes(c));
      if(isNew){ playBeep(); addHistory(cities); scheduleAlertClear(); }
      alertCities=cities; updateUI(cities);
    }
  }catch(e){}
  document.getElementById("lastupdate").textContent="עודכן: "+new Date().toLocaleTimeString("he-IL");
}

// ─── BEEP ────────────────────────────────────────────────
function playBeep(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [0,0.35,0.7].forEach(d=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=d===0.35?660:880;
      g.gain.setValueAtTime(0.3,ctx.currentTime+d);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+d+0.3);
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+0.35);
    });
  }catch(e){}
}

// ─── DEMO ────────────────────────────────────────────────
function toggleDemo(){
  demoMode=!demoMode;
  const btn=document.getElementById("btn-demo");
  btn.textContent=demoMode?"■ עצור":"▶ דמו";
  btn.classList.toggle("active",demoMode);
  if(!demoMode){ clearAlert(); } else runDemo();
}
function runDemo(){
  if(!demoMode) return;
  const cities=DEMO_SCENARIOS[demoIndex%DEMO_SCENARIOS.length]; demoIndex++;
  if(cities.length>0){ playBeep(); addHistory(cities); scheduleAlertClear(); }
  alertCities=cities; updateUI(cities);
  document.getElementById("lastupdate").textContent="דמו — "+new Date().toLocaleTimeString("he-IL");
  setTimeout(runDemo,4500);
}

// ─── WAKE LOCK ───────────────────────────────────────────
async function toggleWakeLock(){
  const btn=document.getElementById("btn-wakelock"),footer=document.getElementById("footer-wakelock");
  if(!("wakeLock" in navigator)){ alert("הדפדפן לא תומך ב-Wake Lock.\nנסה כרום."); return; }
  if(!wakeLockActive){
    try{
      wakeLockObj=await navigator.wakeLock.request("screen");
      wakeLockActive=true; btn.textContent="☀️ מסך נעול"; btn.classList.add("active");
      footer.textContent="☀️ מסך נעול"; footer.style.color="#10b981";
      wakeLockObj.addEventListener("release",()=>{
        wakeLockActive=false; btn.textContent="💤 נעל מסך"; btn.classList.remove("active");
        footer.textContent="💤 מסך פנוי"; footer.style.color="#555";
      });
    }catch(e){ alert("שגיאה: "+e.message); }
  } else { await wakeLockObj.release(); }
}
document.addEventListener("visibilitychange",async()=>{
  if(wakeLockActive&&document.visibilityState==="visible"){
    try{ wakeLockObj=await navigator.wakeLock.request("screen"); }catch(e){}
  }
});

// ─── INIT ────────────────────────────────────────────────
buildTags(); updateUI([]); fetchOref();
setInterval(()=>{ if(!demoMode) fetchOref(); }, 5000);
</script>
